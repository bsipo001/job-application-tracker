{% extends "base.html" %}
{% block title %}{% if application %}Edit Application{% else %}Add Application{% endif %}{% endblock %}
{% block content %}
<h1>{% if application %}Edit Application{% else %}Add New Application{% endif %}</h1>
<form method="POST">
<label>Job</label>
<select name="job_id">
<option value="">-- Select Job --</option>
{% for job in jobs %}
<option value="{{ job.job_id }}" {% if application and application.job_id == job.job_id %}selected{% endif %}>{{ job.job_title }}{% if job.company_name %} - {{ job.company_name }}{% endif %}</option>
{% endfor %}
</select>
<div class="grid-2">
<div><label>Application Date *</label><input type="date" name="application_date" value="{{ application.application_date if application and application.application_date else '' }}" required></div>
<div>
<label>Status</label>
<select name="status">
<option value="">-- Select Status --</option>
{% for s in ['Applied','Screening','Interview','Offer','Rejected','Withdrawn'] %}
<option value="{{ s }}" {% if application and application.status == s %}selected{% endif %}>{{ s }}</option>
{% endfor %}
</select>
</div>
</div>
<label>Resume Version</label>
<input type="text" name="resume_version" value="{{ application.resume_version if application else '' }}">
<label><input type="checkbox" name="cover_letter_sent" {% if application and application.cover_letter_sent %}checked{% endif %}> Cover Letter Sent</label>
<label>Interview Notes</label>
<textarea name="interview_notes">{% if application and application.interview_data and application.interview_data.notes %}{{ application.interview_data.notes }}{% endif %}</textarea>
<button type="submit" class="btn">Save</button>
<a class="btn btn-secondary" href="{{ url_for('applications') }}">Cancel</a>
</form>
{% endblock %}
